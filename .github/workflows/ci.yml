name: CI — Build + Deploy + Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── 1. BUILD KONTROLü ──────────────────────────────────────────────
  build-check:
    name: Build Kontrolü
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Prisma client üret
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Next.js build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
          NEXTAUTH_SECRET: "ci-test-secret-not-real"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "dkcrf1xw7"

  # ─── 2. RAILWAY DEPLOY BEKLE & DOĞRULA ──────────────────────────────
  deploy-check:
    name: Railway Deploy Doğrula
    runs-on: ubuntu-latest
    needs: build-check
    timeout-minutes: 10
    steps:
      - name: Railway deploy tamamlanana kadar bekle
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="a3d955ad-2f33-4fa1-9405-b3bcf59bed53"
          PROJECT_ID="6f0d59bc-6df0-4118-bcb8-4be3aafc90c1"

          for i in $(seq 1 24); do
            RESULT=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"{deployments(input:{serviceId:\\\"$SERVICE_ID\\\",projectId:\\\"$PROJECT_ID\\\"}){edges{node{id status}}}}\"}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); e=d['data']['deployments']['edges']; print(e[0]['node']['status'] if e else 'UNKNOWN')")

            echo "[$i/24] Deploy durumu: $RESULT"

            if [ "$RESULT" = "SUCCESS" ]; then
              echo "Deploy basarili"
              exit 0
            elif [ "$RESULT" = "FAILED" ] || [ "$RESULT" = "CRASHED" ]; then
              echo "Deploy FAILED"
              exit 1
            fi
            sleep 15
          done
          echo "Deploy 6 dakikada tamamlanmadi"
          exit 1

  # ─── 3. E2E TESTLER ─────────────────────────────────────────────────
  e2e-tests:
    name: E2E Testler
    runs-on: ubuntu-latest
    needs: deploy-check
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Playwright browser yükle
        run: npx playwright install chromium --with-deps

      - name: E2E testleri çalıştır
        run: npx playwright test
        env:
          TEST_URL: https://turbag-app-production.up.railway.app
          TEST_EMAIL: ci-test@turbag.app
          TEST_PASSWORD: CiTest2026
          TEST_ADMIN_EMAIL: uras@turbag.app
          TEST_ADMIN_PASSWORD: uras1903

      - name: Test raporunu kaydet (hata varsa)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── 4. SONUÇ ───────────────────────────────────────────────────────
  notify:
    name: Sonuc
    runs-on: ubuntu-latest
    needs: [build-check, deploy-check, e2e-tests]
    if: always()
    steps:
      - name: Ozet
        run: |
          echo "BUILD   : ${{ needs.build-check.result }}"
          echo "DEPLOY  : ${{ needs.deploy-check.result }}"
          echo "E2E     : ${{ needs.e2e-tests.result }}"
          if [ "${{ needs.build-check.result }}" = "failure" ] || \
             [ "${{ needs.deploy-check.result }}" = "failure" ] || \
             [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "CI BASARISIZ"
            exit 1
          fi
          echo "TUMU TAMAM"
